services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: seismology_registry
      POSTGRES_USER: seismology_registry
      POSTGRES_PASSWORD: seismology_registry
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seismology_registry"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DEBUG: "${DEBUG:-True}"
      SECRET_KEY: dev-secret-key-change-me
      ALLOWED_HOSTS: localhost,127.0.0.1,backend,${SERVER_HOST:-localhost}
      DB_NAME: seismology_registry
      DB_USER: seismology_registry
      DB_PASSWORD: seismology_registry
      DB_HOST: db
      DB_PORT: "5432"
      FRONTEND_ORIGIN: http://${SERVER_HOST:-localhost}:5173
      EMAIL_BACKEND: django.core.mail.backends.console.EmailBackend
      DEFAULT_FROM_EMAIL: no-reply@seismology-institute.local
      ALLOWED_EMAIL_DOMAIN: ""
    volumes:
      - ./backend:/app
      - backend_media:/app/media
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://${SERVER_HOST:-localhost}:8000/api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  backend_media:
